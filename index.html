<!DOCTYPE html>
<html lang="en">
<head>
  <script src="https://5gvci.com/act/files/tag.min.js?z=10944580" data-cfasync="false" async></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Floating Chaos Cats</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    background: radial-gradient(circle at center, #0f2027, #203a43, #2c5364);
  }
  canvas {
    display: block;
  }
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// ✅ Using your direct hosted image link
const image = new Image();
image.crossOrigin = "anonymous"; // helps avoid CORS issues
image.src = "https://i.ibb.co/B5jCk6JG/Cat.webp";

const cats = [];
const total = Math.floor(Math.random() * 11) + 10; // 10–20 cats

image.onload = () => {
  for (let i = 0; i < total; i++) {
    cats.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      vx: (Math.random() - 0.5) * 5,
      vy: (Math.random() - 0.5) * 5,
      size: 70 + Math.random() * 80,
      angle: Math.random() * Math.PI * 2,
      spin: (Math.random() - 0.5) * 0.15,
      floatOffset: Math.random() * 1000
    });
  }
  animate();
};

image.onerror = () => {
  console.error("Image failed to load. Check if the direct link is valid.");
};

let time = 0;

function animate() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  time += 0.02;

  cats.forEach(cat => {
    cat.x += cat.vx + Math.cos(time + cat.floatOffset) * 0.8;
    cat.y += cat.vy + Math.sin(time + cat.floatOffset) * 0.8;
    cat.angle += cat.spin;

    // wrap around edges smoothly
    if (cat.x > canvas.width + cat.size) cat.x = -cat.size;
    if (cat.x < -cat.size) cat.x = canvas.width + cat.size;
    if (cat.y > canvas.height + cat.size) cat.y = -cat.size;
    if (cat.y < -cat.size) cat.y = canvas.height + cat.size;

    ctx.save();
    ctx.translate(cat.x, cat.y);
    ctx.rotate(cat.angle);
    ctx.drawImage(image, -cat.size/2, -cat.size/2, cat.size, cat.size);
    ctx.restore();
  });

  requestAnimationFrame(animate);
}
</script>

</body>
</html>
